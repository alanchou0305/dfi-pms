<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DFI PMS — Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/shared.css" />
  <link rel="stylesheet" href="css/categories.css" />
  <link rel="stylesheet" href="css/products.css" />
</head>
<body>

<!-- ============================================================
     AUTH PAGES
     ============================================================ -->

<!-- Login -->
<div id="view-login" class="auth-page">
  <div class="auth-card">
    <div class="brand">
      <div class="brand-icon">D</div>
      <span class="brand-name">DFI PMS</span>
    </div>
    <h1>後台管理系統</h1>
    <p>請使用公司 Microsoft 帳號登入</p>
    <button class="btn-microsoft" onclick="navigate('products')">
      <svg width="18" height="18" viewBox="0 0 21 21" fill="none">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Sign in with Microsoft
    </button>
  </div>
</div>

<!-- 403 -->
<div id="view-403" class="auth-page">
  <div class="auth-card">
    <div class="error-page-content">
      <div class="error-code">403</div>
      <div class="error-title">無存取權限</div>
      <div class="error-desc">您的帳號無此頁面的讀取權限，請聯繫管理員。</div>
      <button class="btn btn-primary" onclick="navigate('products')">返回首頁</button>
    </div>
  </div>
</div>

<!-- 404 -->
<div id="view-404" class="auth-page">
  <div class="auth-card">
    <div class="error-page-content">
      <div class="error-code">404</div>
      <div class="error-title">找不到頁面</div>
      <div class="error-desc">您所存取的頁面不存在或已被移除。</div>
      <button class="btn btn-primary" onclick="navigate('products')">返回首頁</button>
    </div>
  </div>
</div>

<!-- ============================================================
     APP LAYOUT
     ============================================================ -->
<div id="app-layout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon">D</div>
      <span class="sidebar-logo-text">DFI PMS</span>
    </div>

    <nav class="sidebar-nav">

      <!-- 產品管理 -->
      <div class="nav-section">
        <div class="nav-section-label">內容管理</div>
        <div id="grp-products-toggle" class="nav-group-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
          產品管理
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div id="grp-products" class="nav-group-children">
          <div id="nav-products" class="nav-item" onclick="navigate('products')">產品列表</div>
          <div id="nav-categories" class="nav-item" onclick="navigate('categories')">產品分類</div>
          <div id="nav-filters" class="nav-item" onclick="navigate('filters')">篩選器</div>
          <div id="nav-tags" class="nav-item" onclick="navigate('tags')">Tags</div>
          <div id="nav-specs" class="nav-item" onclick="navigate('specs')">規格欄位</div>
        </div>
      </div>

      <!-- 檔案管理 -->
      <div class="nav-section">
        <div id="grp-files-toggle" class="nav-group-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          檔案管理
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div id="grp-files" class="nav-group-children">
          <div id="nav-files" class="nav-item" onclick="navigate('files')">檔案列表</div>
          <div id="nav-file-categories" class="nav-item" onclick="navigate('file-categories')">檔案分類</div>
        </div>
      </div>

      <!-- 帳號管理 / 系統管理 -->
      <div class="nav-section">
        <div class="nav-section-label">系統</div>
        <div id="grp-accounts-toggle" class="nav-group-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          帳號管理
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div id="grp-accounts" class="nav-group-children">
          <div id="nav-users" class="nav-item" onclick="navigate('users')">使用者</div>
          <div id="nav-roles" class="nav-item" onclick="navigate('roles')">角色權限</div>
        </div>

        <div id="grp-system-toggle" class="nav-group-toggle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
          系統管理
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
        </div>
        <div id="grp-system" class="nav-group-children">
          <div id="nav-languages" class="nav-item" onclick="navigate('languages')">語系管理</div>
          <div id="nav-logs" class="nav-item" onclick="navigate('logs')">系統日誌</div>
        </div>
      </div>

    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Topbar -->
    <header class="topbar">
      <nav id="breadcrumb" class="breadcrumb"></nav>
      <div class="topbar-right">
        <div class="user-menu">
          <div class="user-avatar">AD</div>
          <span class="user-name">Admin</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="content">
      <div id="view-container"></div>
    </main><!-- /content -->
  </div><!-- /main -->
</div><!-- /app-layout -->

<script type="module" src="js/router.js"></script>

<!-- ============================================================
     MODALS
     ============================================================ -->

<!-- Add Category Type Modal -->
<div id="add-cat-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAddCatModal()">
  <div class="modal" style="width:380px">
    <div class="modal-header">
      <h3>新增分類</h3>
      <button class="modal-close" onclick="closeAddCatModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" style="padding:20px;display:flex;gap:12px">
      <button class="cat-type-card" onclick="closeAddCatModal();navigate('categories-edit')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span class="cat-type-label">大分類</span>
        <span class="cat-type-desc">頂層分類，可包含多個次分類</span>
      </button>
      <button class="cat-type-card" onclick="closeAddCatModal();navigate('categories-edit')">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        <span class="cat-type-label">次分類</span>
        <span class="cat-type-desc">隸屬於某個大分類下的子分類</span>
      </button>
    </div>
  </div>
</div>

<!-- Add Relation / Accessory Modal -->
<div id="add-relation-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeAddRelationModal()">
  <div class="modal" style="width:480px">
    <div class="modal-header">
      <h3 id="add-relation-modal-title">新增衍生產品</h3>
      <button class="modal-close" onclick="closeAddRelationModal()">×</button>
    </div>
    <div style="padding:10px 16px;border-bottom:1px solid var(--border)">
      <div class="search-input" style="max-width:100%">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="add-relation-modal-search" type="text" placeholder="搜尋型號 / 分類..." />
      </div>
    </div>
    <div class="modal-body" id="add-relation-modal-list" style="max-height:380px;overflow-y:auto;padding:0">
      <!-- populated by openAddRelationModal() -->
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeAddRelationModal()">完成</button>
    </div>
  </div>
</div>

<div id="sync-modal" class="modal-overlay" style="display:none" onclick="handleSyncOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <h3>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-2px;margin-right:6px"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        同步產品至官網
      </h3>
      <button class="modal-close" onclick="closeSyncModal()">×</button>
    </div>
    <div class="sync-select-all-row" id="sync-select-all-row" style="display:none">
      <label style="display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border);font-size:13px;cursor:pointer;background:var(--sidebar-bg)">
        <input type="checkbox" id="sync-select-all" checked onchange="toggleSyncSelectAll(this)" />
        <span style="font-weight:500">全選</span>
      </label>
    </div>
    <div class="modal-body" id="sync-modal-body">
      <!-- populated by openSyncModal() -->
    </div>
    <div class="modal-footer">
      <span id="sync-modal-count" style="font-size:12px;color:var(--text-2);margin-right:auto"></span>
      <button class="btn btn-secondary" onclick="closeSyncModal()">取消</button>
      <button class="btn btn-primary" id="sync-modal-confirm" onclick="confirmSync()">確認同步</button>
    </div>
  </div>
</div>
</body>
</html>
