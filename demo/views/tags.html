<!-- 2.4 Tag 列表 -->
<div id="view-tags" class="view">
  <div class="page-header">
    <h2>Tag 管理</h2>
    <div class="actions">
      <button class="btn btn-primary" onclick="navigate('tags-edit')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新增 Tag
      </button>
    </div>
  </div>
  <div class="card">
    <div class="toolbar">
      <div class="search-input">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="搜尋 Tag..." />
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tag 名稱</th>
            <th>語系狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="3"><div class="empty-state"><div class="empty-state-icon">🏷</div><div class="empty-state-text">尚無 Tag 資料</div></div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="pagination-info">共 0 筆</span>
      <div class="pagination-pages"><div class="page-btn">‹</div><div class="page-btn active">1</div><div class="page-btn">›</div></div>
    </div>
  </div>
</div>

<!-- 2.4.1 Tag 編輯 -->
<div id="view-tags-edit" class="view">
  <div class="form-header">
    <button class="back-btn" onclick="navigate('tags')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2>Tag 編輯</h2>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="navigate('tags')">取消</button>
      <button class="btn btn-primary">儲存</button>
    </div>
  </div>
  <div class="form-section">
    <div class="form-section-header">語系管理</div>
    <div class="form-section-body" style="padding:0">
      <div class="tabs-card" style="border:none;box-shadow:none;margin:0">
        <div class="tabs-bar" id="tag-lang-tabs-bar">
          <!-- rendered by renderTagLangTabs() -->
        </div>
        <div id="tag-lang-tab-panels">
          <!-- rendered by renderTagLangTabs() -->
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Tag 語系 — 複製語系內容 -->
<div id="tag-lang-copy-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h3 class="modal-title">複製語系內容</h3>
      <button class="modal-close" onclick="document.getElementById('tag-lang-copy-modal').style.display='none'">×</button>
    </div>
    <div class="modal-body" style="padding:20px">
      <div style="margin-bottom:20px">
        <div class="form-label" style="margin-bottom:10px">來源語系</div>
        <div id="tag-lang-copy-source"></div>
      </div>
      <div style="margin-bottom:16px">
        <div class="form-label" style="margin-bottom:10px">複製到</div>
        <div id="tag-lang-copy-targets"></div>
      </div>
      <div style="background:#FFFBEB;border:1px solid #FDE68A;border-radius:6px;padding:10px 12px;font-size:12px;color:#92400E">
        此操作將覆蓋目標語系現有的草稿內容，複製後狀態將自動標記為「待同步」。
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('tag-lang-copy-modal').style.display='none'">取消</button>
      <button class="btn btn-primary" onclick="confirmTagLangCopy()">確認複製</button>
    </div>
  </div>
</div>

<!-- Modal: Tag 語系 — 停用確認 -->
<div id="tag-lang-disable-modal" class="modal-overlay" style="display:none">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h3 class="modal-title">確認停用語系</h3>
      <button class="modal-close" onclick="document.getElementById('tag-lang-disable-modal').style.display='none'">×</button>
    </div>
    <div class="modal-body" style="padding:20px">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div style="flex-shrink:0;width:36px;height:36px;border-radius:50%;background:#FEF2F2;display:flex;align-items:center;justify-content:center">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        </div>
        <div>
          <div style="font-weight:600;margin-bottom:6px">停用 <span id="tag-disable-lang-name"></span> 語系</div>
          <div style="font-size:13px;color:var(--text-2);line-height:1.6">停用後，此語系的 Tag 頁面將不對外顯示。此操作可隨時重新啟用。</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="document.getElementById('tag-lang-disable-modal').style.display='none'">取消</button>
      <button class="btn btn-primary" style="background:#DC2626;border-color:#DC2626" onclick="confirmTagLangDisable()">確認停用</button>
    </div>
  </div>
</div>
