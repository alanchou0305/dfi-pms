<!-- 2.4 Tag 列表 -->
<div id="view-tags" class="view">
  <div class="page-header">
    <h2>Tag 管理</h2>
    <div class="actions">
      <button class="btn btn-primary" onclick="navigate('tags-edit')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新增 Tag
      </button>
    </div>
  </div>
  <div class="card">
    <div class="toolbar">
      <div class="search-input">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="搜尋 Tag..." />
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Tag 名稱</th>
            <th>語系狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="3"><div class="empty-state"><div class="empty-state-icon">🏷</div><div class="empty-state-text">尚無 Tag 資料</div></div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="pagination-info">共 0 筆</span>
      <div class="pagination-pages"><div class="page-btn">‹</div><div class="page-btn active">1</div><div class="page-btn">›</div></div>
    </div>
  </div>
</div>

<!-- 2.4.1 Tag 編輯 -->
<div id="view-tags-edit" class="view">
  <div class="form-header">
    <button class="back-btn" onclick="navigate('tags')">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <h2>Tag 編輯</h2>
    <div class="form-actions">
      <button class="btn btn-secondary" onclick="navigate('tags')">取消</button>
      <button class="btn btn-primary">儲存</button>
    </div>
  </div>
  <div class="tabs-card">
    <div class="lang-tabs-bar" data-lang-group="tag-edit" style="padding:12px 16px 0">
      <button class="lang-tab-btn active" data-lang="en">EN</button>
      <button class="lang-tab-btn" data-lang="tw">TW</button>
      <button class="lang-tab-btn" data-lang="cn">CN</button>
      <button class="lang-tab-btn" data-lang="jp">JP</button>
      <button class="lang-tab-btn" data-lang="de">DE</button>
    </div>
    <div style="border-top:1px solid var(--border);padding:20px">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">語系狀態</label>
          <select class="form-input"><option>啟用</option><option>停用</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">URL Slug</label>
          <input class="form-input" type="text" placeholder="" />
        </div>
        <div class="form-group">
          <label class="form-label">Tag 名稱</label>
          <input class="form-input" type="text" placeholder="" />
        </div>
        <div class="form-group">
          <label class="form-label">H1 標題</label>
          <input class="form-input" type="text" placeholder="" />
        </div>
        <div class="form-group form-full">
          <label class="form-label">內容</label>
          <div class="richtext-placeholder">富文字編輯器</div>
        </div>
        <div class="form-group">
          <label class="form-label">SEO Title</label>
          <input class="form-input" type="text" placeholder="" />
        </div>
        <div class="form-group">
          <label class="form-label">SEO Description</label>
          <textarea class="form-input" rows="2" placeholder=""></textarea>
        </div>
      </div>
    </div>
  </div>
</div>
